apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xbuckets.localstack.s3
  labels:
    provider: aws-localstack
spec:
  mode: Pipeline
  compositeTypeRef:
    apiVersion: platform.acme.io/v1alpha1
    kind: XBucket
  pipeline:
    - step: render-bucket-and-secret
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # 1. The S3 bucket (v2 namespaced MR). Its name is computed
          #    deterministically as <prefix><XR-name>-<XR-uid> and set as the
          #    external name, which upjet maps to the aws_s3_bucket.bucket arg.
          #    The XR uid is random and stable, so the name has a genuine random
          #    component while still being knowable to the composition.
          - name: s3-bucket
            base:
              apiVersion: s3.aws.m.upbound.io/v1beta1
              kind: Bucket
              metadata:
                generateName: poc-bucket-mr-
              spec:
                forProvider:
                  region: us-east-1
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: localstack
            patches:
              - type: CombineFromComposite
                combine:
                  strategy: string
                  variables:
                    - fromFieldPath: spec.bucketPrefix
                    - fromFieldPath: metadata.name
                    - fromFieldPath: metadata.uid
                  string:
                    fmt: "%s%s-%s"
                toFieldPath: metadata.annotations[crossplane.io/external-name]
          # 2. A native Kubernetes Secret composed by Crossplane carrying the
          #    dynamic bucket name. In v2 the composed Secret lands in the XR's
          #    own namespace automatically (no namespace patch needed). This is
          #    the v2-native replacement for the deprecated XR connection secret.
          - name: bucket-secret
            base:
              apiVersion: v1
              kind: Secret
              metadata:
                name: placeholder
              type: Opaque
              stringData:
                bucketName: ""
            patches:
              - type: CombineFromComposite
                combine:
                  strategy: string
                  variables:
                    - fromFieldPath: spec.bucketPrefix
                    - fromFieldPath: metadata.name
                    - fromFieldPath: metadata.uid
                  string:
                    fmt: "%s%s-%s"
                toFieldPath: stringData.bucketName
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-bucket"
            # Native Kubernetes objects expose no Ready condition; existence = ready.
            readinessChecks:
              - type: None
          # 3. Vault sync, in-composite and lifecycle-coupled. An ESO PushSecret
          #    pushes the composed Secret's bucketName into Vault KV at a STABLE,
          #    consumer-knowable path (crossplane/<xr-name>-bucket). Because the
          #    PushSecret is itself a composed resource it shares the XR's
          #    lifecycle, and deletionPolicy: Delete makes ESO remove the Vault
          #    entry when the XR (hence this PushSecret) is deleted -- so the secret
          #    dies with the bucket, no orphans. This replaces the provider-terraform
          #    Workspace: no terraform, no registry.terraform.io plugin pulls, no
          #    tfstate backend. It pushes through the namespace's vault-backend
          #    SecretStore (created by the demo-app chart) into the same Vault that
          #    demo-app-2 reads from -- the producer and consumer are now symmetric
          #    ESO objects (PushSecret out, ExternalSecret in).
          - name: vault-secret
            base:
              apiVersion: external-secrets.io/v1alpha1
              kind: PushSecret
              metadata:
                generateName: demo-vault-
              spec:
                refreshInterval: 10s
                # Remove the value from Vault when this PushSecret is deleted.
                deletionPolicy: Delete
                secretStoreRefs:
                  - name: vault-backend
                    kind: SecretStore
                selector:
                  secret:
                    name: placeholder   # patched to <xr-name>-bucket
                data:
                  - match:
                      secretKey: bucketName
                      remoteRef:
                        remoteKey: placeholder   # patched to crossplane/<xr-name>-bucket
                        property: bucketName
            patches:
              # source Secret name = <xr-name>-bucket (the composed Secret above)
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.selector.secret.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-bucket"
              # Vault path = crossplane/<xr-name>-bucket (what demo-app-2 reads)
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: spec.data[0].match.remoteRef.remoteKey
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "crossplane/%s-bucket"
            # PushSecret reports Ready=True once it has synced to Vault, so coupling
            # XR readiness to it proves the value actually landed (the demo's point).
            readinessChecks:
              - type: MatchCondition
                matchCondition:
                  type: Ready
                  status: "True"
