apiVersion: aws.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: ministack
spec:
  credentials:
    source: Secret
    secretRef:
      name: ministack-aws-creds
      namespace: crossplane-system
      key: creds
  endpoint:
    url:
      type: Static
      static: http://ministack.ministack-system.svc.cluster.local:4566
    # source: Custom is REQUIRED for the static URL to be honored. With the
    # default (ServiceMetadata) the AWS SDK v2 resolves the endpoint from AWS
    # service metadata (i.e. real AWS), ignoring the static URL entirely.
    source: Custom
    hostnameImmutable: true
    signingRegion: us-east-1
    signingName: s3
    # services is REQUIRED: without it the override applies to NO service and
    # the SDK falls back to real AWS endpoints (-> 403 InvalidAccessKeyId).
    services:
      - s3
  skip_credentials_validation: true
  skip_region_validation: true
  skip_metadata_api_check: true
  skip_requesting_account_id: true
  s3_use_path_style: true
