apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-terraform-runtime
  namespace: crossplane-system
spec:
  # `terraform init` (run inside this provider's pod) downloads the hashicorp/vault
  # provider plugin from registry.terraform.io over HTTPS. Behind a TLS-intercepting
  # proxy that fails with "x509: certificate signed by unknown authority". terraform
  # is a Go binary, so SSL_CERT_FILE makes it trust the proxy's CA. We mount the same
  # registry-ca ConfigMap that up.sh builds for crossplane (full host trust bundle,
  # which includes the proxy CA) and point SSL_CERT_FILE at it. On a machine without a
  # proxy this is a harmless extra trust bundle.
  deploymentTemplate:
    spec:
      selector:
        matchLabels:
          pkg.crossplane.io/provider: provider-terraform
      template:
        metadata:
          labels:
            pkg.crossplane.io/provider: provider-terraform
        spec:
          containers:
            - name: package-runtime
              env:
                - name: SSL_CERT_FILE
                  value: /etc/ssl/corp/ca-bundle.crt
              volumeMounts:
                - name: registry-ca
                  mountPath: /etc/ssl/corp
                  readOnly: true
          volumes:
            - name: registry-ca
              configMap:
                name: registry-ca
