apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-s3
spec:
  # v2 per-service provider. Auto-resolves its provider-family-aws dependency.
  # Registers the namespaced MRs under s3.aws.m.upbound.io.
  package: xpkg.upbound.io/crossplane-contrib/provider-aws-s3:v2.0.0
  runtimeConfigRef:
    name: provider-aws-s3-runtime
    kind: DeploymentRuntimeConfig
# Vault sync no longer uses provider-terraform -- it is done by a composed ESO
# PushSecret (see crossplane/composition.yaml), so no terraform provider here.
