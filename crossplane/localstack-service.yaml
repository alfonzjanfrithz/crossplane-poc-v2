apiVersion: v1
kind: Namespace
metadata:
  name: localstack-system
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: localstack-system
spec:
  # No selector: manual Endpoints give pods a stable in-cluster DNS name
  # (localstack.localstack-system.svc.cluster.local) that routes to the
  # LocalStack container running outside k8s on the podman 'kind' bridge
  # network at pinned IP 10.89.1.10.
  type: ClusterIP
  ports:
    - name: edge
      port: 4566
      targetPort: 4566
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: localstack
  namespace: localstack-system
subsets:
  - addresses:
      - ip: 10.89.1.10
    ports:
      - name: edge
        port: 4566
        protocol: TCP
