apiVersion: v1
kind: Namespace
metadata:
  name: localstack-system
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: localstack-system
spec:
  # No selector: manual Endpoints give pods a stable in-cluster DNS name
  # (localstack.localstack-system.svc.cluster.local) that routes to the
  # LocalStack container running outside k8s on the podman 'kind' bridge
  # network. The address below is a placeholder (__LOCALSTACK_IP__) that
  # up.sh substitutes with the IP podman actually assigned the container.
  type: ClusterIP
  ports:
    - name: edge
      port: 4566
      targetPort: 4566
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: localstack
  namespace: localstack-system
subsets:
  - addresses:
      - ip: __LOCALSTACK_IP__
    ports:
      - name: edge
        port: 4566
        protocol: TCP
