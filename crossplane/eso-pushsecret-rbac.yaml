# Crossplane's composite controller composes the PushSecret (resource #3 in the
# Composition) using the core crossplane ServiceAccount. Its aggregated RBAC
# covers core types (e.g. the composed Secret) but NOT the external-secrets.io
# PushSecret CRD, so composing it would fail with "cannot create PushSecret:
# ...forbidden". This ClusterRole, labelled to aggregate into the crossplane
# ClusterRole, grants that access. (Provider MRs get RBAC automatically; arbitrary
# CRDs we compose natively in v2 do not -- this is the PushSecret equivalent of
# the family-config RBAC the AWS provider needs.)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-compose-pushsecret
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["pushsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
