{{- $name := .Values.name -}}
{{- $ns := .Values.namespace -}}
# v2: the application creates the namespaced composite resource directly (no
# claim). Crossplane renders it in this namespace and the composed resources
# (S3 Bucket, Secret, Vault-sync PushSecret) land here too.
apiVersion: platform.acme.io/v1alpha1
kind: XBucket
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: {{ $name }}
spec:
  bucketPrefix: {{ .Values.bucketPrefix | quote }}
  # v2: Crossplane machinery (compositionRef, resourceRefs, ...) lives under
  # spec.crossplane, not directly under spec.
  crossplane:
    compositionRef:
      name: xbuckets.ministack.s3
