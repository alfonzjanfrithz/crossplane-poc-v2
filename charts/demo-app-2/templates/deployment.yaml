apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: demo-app-2
    app.kubernetes.io/instance: {{ .Values.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-app-2
      app.kubernetes.io/instance: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-app-2
        app.kubernetes.io/instance: {{ .Values.name }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The shared bucket name, materialised into this namespace by the
          # ExternalSecret from Vault. The pod will not start until that Secret
          # exists -- i.e. until Vault has the value demo-app pushed. That
          # ordering is what makes this a self-proving sharing demo.
          env:
            - name: BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: shared-bucket
                  key: bucketName
            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test
            - name: AWS_REGION
              value: us-east-1
            # AWS CLI/SDK v2 defaults to the CRC64NVME checksum; MiniStack only
            # bundles SHA256/SHA1/CRC32. Only checksum when required (see demo-app).
            - name: AWS_REQUEST_CHECKSUM_CALCULATION
              value: when_required
            - name: AWS_RESPONSE_CHECKSUM_VALIDATION
              value: when_required
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "consumer up; shared bucket name obtained from Vault via ExternalSecret"
              while true; do
                TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                echo "[${TS}] shared bucket = ${BUCKET_NAME}"
                echo "[${TS}] objects written by demo-app visible in s3://${BUCKET_NAME}/msgs/:"
                aws --endpoint-url=http://ministack.ministack-system.svc.cluster.local:4566 \
                    --region us-east-1 \
                    s3 ls "s3://${BUCKET_NAME}/msgs/" 2>&1 | tail -3 || echo "  (list failed)"
                sleep {{ .Values.pollSeconds }}
              done
