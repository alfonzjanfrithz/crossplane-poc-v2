apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: demo-app
type: Opaque
stringData:
  # Dev-mode root token. In a real setup this would be a scoped token.
  token: root
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: demo-app
spec:
  provider:
    vault:
      server: http://vault.rss.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: bucket-to-vault
  namespace: demo-app
spec:
  # Re-sync frequently so updates to the composed Secret propagate to Vault.
  refreshInterval: 10s
  secretStoreRefs:
    - name: vault-backend
      kind: SecretStore
  selector:
    secret:
      name: demo-app-bucket
  data:
    # Mirror the bucketName key from the Kubernetes Secret produced by the
    # Crossplane composition into Vault KV v2 at secret/crossplane/demo-app-bucket.
    - match:
        secretKey: bucketName
        remoteRef:
          remoteKey: crossplane/demo-app-bucket
          property: bucketName
